    -<compat/lvgl_v9_5_compat.c>
    -<compat/lvgl_v9_5_compat.cpp>
    -<test_main.cpp>
    +<../src/wifi/>
    +<../src/web/>
    +<../src/ota/>
extra_scripts =
    pre:scripts/auto_src_filter.py
    post:scripts/release_package.py
lib_ignore = WebServer
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.5.0
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
    me-no-dev/ESPAsyncWebServer@^3.1.0
    bblanchon/ArduinoJson@^7
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_VARIANT_RELEASE
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    ; TFT 引脚（TFT_eSPI 库通过编译期宏读取，必须放 build_flags）
    -DTFT_SCLK=6
    -DTFT_MOSI=7
    -DTFT_MISO=-1
    -DTFT_CS=5
    -DTFT_DC=4
    -DTFT_RST=19
    -DTFT_BL=15
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts
    -DLV_USE_SYSMON=0
    -DLV_USE_PERF_MONITOR=0
    -DLV_USE_MEM_MONITOR=0
    -DLV_USE_REFR_DEBUG=0
    -DLV_USE_LOG=0
    -DNDEBUG
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17

; ─────────────────────────────────────────────────────────────────────────────
; [env:secure] = [env:release] 的克隆 + Flash Encryption (dev-mode) 加密打包
;   - 固件二进制与 release 完全同构（保留 -DBOARD_VARIANT_RELEASE / 产品引脚）
;   - 仅分区表换成带 encrypted 标志的 secure_8MB.csv
;   - post 脚本 secure_package.py 用 espsecure 主机侧预加密 + merge（防 dump）
;   - 不复用 release_package.py，零风险隔离 release 路径
;   - eFuse 烧录不在编译流程内，见 scripts/provision_efuse.py + docs/flash-encryption-guide.md
; ─────────────────────────────────────────────────────────────────────────────
[env:secure]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

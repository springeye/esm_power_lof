[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.2.2
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=16
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -Iinclude
    -Isrc
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17

[env:native]
platform = native
test_framework = unity
build_flags = -std=c++17 -Iinclude -Isrc
test_build_project_src = yes
build_src_filter =
    +<sensors/ntc/ntc.cpp>
    +<fan/fan_curve.cpp>
    +<power/psu_fsm.cpp>
    +<input/keys.cpp>
lib_deps =

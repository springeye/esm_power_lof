[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_src_filter =
    +<*>
    +<../src/compat/lvgl_v8_shim.cpp>
    -<ui/_legacy/>
    -<compat/lvgl_v9_5_compat.c>
    -<compat/lvgl_v9_5_compat.cpp>
    -<test_main.cpp>
extra_scripts = pre:scripts/auto_src_filter.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.5.0
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT          ; ESP32-S3 必需，否则 SPI_PORT=0 导致 NULL 解引用崩溃
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    ; ── TFT 引脚（与 include/pins.h 保持一致） ──
    ; N8R8 模组的 Octal PSRAM 占用 GPIO 33/34/35/36/37，全部不可用！
    ; 改用 FSPI 默认引脚 11/12/9/13，走 IO_MUX 直连，刷屏速度最佳。
    -DTFT_MOSI=11            ; FSPI D（默认 MOSI），走 IO_MUX 直连
    -DTFT_SCLK=12            ; FSPI CLK（默认 SCLK），走 IO_MUX 直连
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_MISO=9             ; FSPI Q（默认 MISO），单向 SPI 实际不用，但需占空闲脚避免 -1→0xFF Bug
    -DSPI_FREQUENCY=60000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17

[env:test]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
test_build_src = yes
test_filter = *
build_src_filter =
    +<*>
    +<../src/compat/lvgl_v8_shim.cpp>
    -<ui/_legacy/>
    -<compat/lvgl_v9_5_compat.c>
    -<compat/lvgl_v9_5_compat.cpp>
    -<main.cpp>
    +<test_main.cpp>
extra_scripts = pre:scripts/auto_src_filter.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.5.0
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_MISO=9
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts


[env:release]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_type = release
build_src_filter =
    +<*>
    +<../src/compat/lvgl_v8_shim.cpp>
    -<ui/_legacy/>
    -<compat/lvgl_v9_5_compat.c>
    -<compat/lvgl_v9_5_compat.cpp>
    -<test_main.cpp>
extra_scripts =
    pre:scripts/auto_src_filter.py
    post:scripts/release_package.py
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.5.0
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_MISO=9
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts
    ; ── Release: 禁用调试功能 ──
    -DLV_USE_SYSMON=0
    -DLV_USE_PERF_MONITOR=0
    -DLV_USE_MEM_MONITOR=0
    -DLV_USE_REFR_DEBUG=0
    -DLV_USE_LOG=0
    -DNDEBUG
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_build.psram_type = opi
board_upload.flash_size = 8MB
build_src_filter =
    +<*>
    +<../src/compat/lvgl_v8_shim.cpp>
    -<ui/_legacy/>
    -<compat/lvgl_v9_5_compat.c>
    -<compat/lvgl_v9_5_compat.cpp>
    -<test_main.cpp>
    +<../src/wifi/>
    +<../src/web/>
    +<../src/ota/>
extra_scripts = pre:scripts/auto_src_filter.py
lib_ignore = WebServer
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.5.0
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
    me-no-dev/ESPAsyncWebServer@^3.1.0
    bblanchon/ArduinoJson@^7
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_VARIANT_DEV
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    ; TFT 引脚（TFT_eSPI 库通过编译期宏读取，必须放 build_flags）
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_MISO=9
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17


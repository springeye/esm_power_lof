[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions/default_8MB.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_src_filter =
    +<*>
    +<../ui/lof_power_system.c>
    +<../ui/lof_power_system_gen.c>
    +<../ui/screens/home_gen.c>
    +<../ui/screens/splash_gen.c>
    +<../ui/fonts/hos_14_data.c>
    +<../ui/fonts/hos_bold_big_data.c>
    +<../ui/fonts/hos_regular_data.c>
    +<../src/compat/lvgl_v8_shim.cpp>
    -<ui/_legacy/>
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@~9.2.2
    robtillaart/INA226@^0.6.0
    thomasfredericks/Bounce2@^2.71
build_flags =
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT          ; ESP32-S3 必需，否则 SPI_PORT=0 导致 NULL 解引用崩溃
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DCGRAM_OFFSET=1
    ; ── TFT 引脚（与 include/pins.h 保持一致） ──
    ; N8R8 模组的 Octal PSRAM 占用 GPIO 33/34/35/36/37，全部不可用！
    ; 改用 FSPI 默认引脚 11/12/9/13，走 IO_MUX 直连，刷屏速度最佳。
    -DTFT_MOSI=11            ; FSPI D（默认 MOSI），走 IO_MUX 直连
    -DTFT_SCLK=12            ; FSPI CLK（默认 SCLK），走 IO_MUX 直连
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_MISO=9             ; FSPI Q（默认 MISO），单向 SPI 实际不用，但需占空闲脚避免 -1→0xFF Bug
    ; 不要在此定义 TFT_BL！TFT_eSPI 的 ST7789_Init.h 用 #ifdef TFT_BL 而非 #if TFT_BL>=0，
    ; 一旦定义就会执行 pinMode(-1)/digitalWrite(-1) 触发 GPIO 227 错误。
    ; 背光由 src/display/tft_driver.cpp 通过 LEDC ch1 自管 GPIO21（在 include/pins.h 定义）。
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=0
    -DLOAD_FONT2=0
    -DLOAD_FONT4=0
    -DLOAD_GFXFF=0
    -DSMOOTH_FONT=1
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_DRAW_SW_ASM=LV_DRAW_SW_ASM_NONE
    -I .pio/libdeps/esp32s3
    -Iinclude
    -Isrc
    -I ui
    -I ui/screens
    -I ui/fonts
check_tool = cppcheck
check_flags = cppcheck: --enable=warning,style,performance --inconclusive --std=c++17

[env:native]
; native 必须显式列出当前模拟器入口及其 UI/兼容层依赖；旧的单文件 native_main.cpp 配置不会覆盖现有模拟器实现。
platform = native
extra_scripts = pre:scripts/use_msys2_mingw.py
build_flags =
    -std=c++17
    -DBUILD_NATIVE
    -DLV_USE_SDL=0
    -include lvgl_v8_shim.h
    -Iinclude
    -Isrc
    -Iui
    -Iui/screens
    -Iui/fonts
    -I .pio/libdeps/native
build_src_filter =
    ; 原生兼容的业务逻辑
    +<sensors/ntc/ntc.cpp>
    +<fan/fan_curve.cpp>
    +<power/psu_fsm.cpp>
    +<input/keys.cpp>
    ; UI 源（LVGL Editor 生成）
    +<../ui/lof_power_system.c>
    +<../ui/lof_power_system_gen.c>
    +<../ui/screens/home_gen.c>
    +<../ui/screens/splash_gen.c>
    +<../ui/fonts/hos_14_data.c>
    +<../ui/fonts/hos_bold_big_data.c>
    +<../ui/fonts/hos_regular_data.c>
    ; 兼容层
    +<../src/compat/lvgl_v8_shim.cpp>
    +<../src/ui_bridge/lvgl_xml_stubs.c>
    +<app/app_state.cpp>
    +<ui_bridge/screen_manager.cpp>
    +<ui_bridge/data_bridge.cpp>
    +<ui_bridge/input_bridge.cpp>
    ; Native 专用文件
    +<display/tft_driver_native.cpp>
    +<display/lvgl_port_native.cpp>
    +<native/native_main_sim.cpp>
lib_deps =
    lvgl/lvgl@~9.2.2

[env:native-smoke]
extends = env:native
build_src_filter =
    +<native/test_main.cpp>
